<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0f" />
    <title>NEOSWAG // TRANSMISSION PENDING</title>
    <meta name="description" content="MONEY IS TEMPORARY. SWAG IS ETERNAL." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <div class="mesh" aria-hidden="true"></div>
    <div class="scanline" aria-hidden="true"></div>
    <div class="ascii-drift" aria-hidden="true"></div>
    <div class="flash" aria-hidden="true"></div>

    <main class="stage">
      <h1 class="title" aria-label="NEOSWAG">
        <span class="title__layer title__layer--base">
          <span class="char">N</span><span class="char">E</span
          ><span class="char">O</span><span class="char">S</span
          ><span class="char">W</span><span class="char">A</span
          ><span class="char">G</span>
        </span>
        <span class="title__layer title__layer--r" aria-hidden="true"
          >NEOSWAG</span
        >
        <span class="title__layer title__layer--g" aria-hidden="true"
          >NEOSWAG</span
        >
        <span class="title__layer title__layer--b" aria-hidden="true"
          >NEOSWAG</span
        >
      </h1>
      <p class="tagline">
        <span>MONEY IS TEMPORARY.</span>
        <span>SWAG IS ETERNAL.</span>
      </p>
    </main>

    <footer class="sys">
      <div class="sys__bars" aria-hidden="true">
        <i></i><i></i><i></i><i></i><i></i><i></i><i></i>
      </div>
      <div class="sys__line">
        <span class="sys__label">SIGNAL</span>
        <span class="bar" aria-hidden="true"><i style="--p: 41%"></i></span>
        <span class="sys__pct">41%</span>
      </div>
      <div class="sys__line sys__date">
        2026.<span class="rx">XX</span>.<span class="rx">XX</span>
        <span class="sys__sep">//</span>
        TRANSMISSION&nbsp;PENDING
      </div>
      <a
        class="sys__handle"
        href="https://instagram.com/n3oswag"
        target="_blank"
        rel="noopener"
        ><span class="sys__at">@</span>n3oswag</a
      >
    </footer>

    <script src="main.js" defer></script>
  </body>
</html>
