<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#050510" />
    <title>neoswag // transmission pending</title>
    <meta name="description" content="money is temporary. swag is eternal." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@200;300;600;900&family=Open+Sans:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- photographic background (grungy cloud / night sky) -->
    <div class="bg" aria-hidden="true">
      <div class="bg__img"></div>
      <div class="bg__tint"></div>
      <div class="bg__grain"></div>
      <div class="bg__vignette"></div>
    </div>

    <!-- panorama panel label (Metro watermark) -->
    <div class="panel-label" aria-hidden="true">swag</div>

    <main class="pano" role="main">
      <!-- section: home -->
      <section class="pano__section">
        <header class="hub">
          <div class="hub__eyebrow">neoswag</div>
          <h1 class="hub__title">
            <span class="thin">home</span>
          </h1>
        </header>

        <div class="tiles">
          <!-- massive featured photo tile -->
          <a
            class="t t--feat"
            href="https://instagram.com/n3oswag"
            target="_blank"
            rel="noopener"
          >
            <div class="t__bg t__bg--feat"></div>
            <div class="t__shade"></div>
            <div class="t__body">
              <div class="t__kicker">featured</div>
              <div class="t__headline">
                <span class="thin">new</span>
                <span class="black">drop</span>
              </div>
              <div class="t__meta">@n3oswag · coming soon</div>
            </div>
          </a>

          <div class="t t--pink">
            <div class="t__body">
              <div class="t__kicker">signal</div>
              <div class="t__num">41<em>%</em></div>
              <div class="t__bar"><i></i></div>
            </div>
          </div>

          <div class="t t--photo t--people">
            <div class="t__bg t__bg--people"></div>
            <div class="t__shade"></div>
            <div class="t__body">
              <div class="t__kicker">people</div>
              <div class="t__headline">
                <span class="black">neo</span>
              </div>
              <div class="t__meta">1 new</div>
            </div>
          </div>

          <div class="t t--cyan">
            <div class="t__body">
              <div class="t__kicker">date</div>
              <div class="t__headline">
                <span class="thin">2026</span>
                <span class="blocks">··&middot;··</span>
              </div>
              <div class="t__meta">redacted</div>
            </div>
          </div>
        </div>
      </section>

      <!-- section: music -->
      <section class="pano__section">
        <header class="hub hub--sub">
          <div class="hub__eyebrow">neoswag</div>
          <h1 class="hub__title">
            <span class="thin">music</span>
          </h1>
        </header>

        <div class="tiles tiles--row2">
          <div class="t t--photo t--nowplaying t--wide">
            <div class="t__bg t__bg--music"></div>
            <div class="t__shade"></div>
            <div class="t__body">
              <div class="t__kicker">now playing</div>
              <div class="t__headline">
                <span class="black">––––––</span>
              </div>
              <div class="t__meta">locked · untitled track</div>
            </div>
            <div class="t__glyph">♪</div>
          </div>

          <div class="t t--purple">
            <div class="t__body">
              <div class="t__kicker">status</div>
              <div class="t__headline"><span class="thin">pending</span></div>
              <div class="t__dot"></div>
            </div>
          </div>

          <a class="t t--yellow t--dark" href="mailto:hi@neoswag.net">
            <div class="t__body">
              <div class="t__kicker">contact</div>
              <div class="t__headline">
                <span class="thin">hi@</span><br /><span class="black"
                  >neoswag.net</span
                >
              </div>
              <div class="t__meta">bookings / press</div>
            </div>
          </a>

          <div class="t t--green t--dark">
            <div class="t__body">
              <div class="t__kicker">archive</div>
              <div class="t__headline"><span class="thin">∞</span></div>
              <div class="t__meta">locked</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="foot">
      <div class="foot__left">
        <div class="foot__bars" aria-hidden="true">
          <i></i><i></i><i></i><i></i><i></i><i></i><i></i>
        </div>
        <div class="foot__meta">transmission pending</div>
      </div>
      <div class="foot__right">© 2026 neoswag</div>
    </footer>

    <script src="main.js" defer></script>
  </body>
</html>
